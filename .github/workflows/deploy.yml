name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install, build, and upload your site output
        uses: withastro/action@v6
#        with:
#            path: . # The root location of your Astro project inside the repository. (optional)
#            node-version: 24 # The specific version of Node that should be used to build your site. Defaults to 24. (optional)
#            package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)
#            build-cmd: npm run build # The command to run to build your site. Runs the package build script/task by default. (optional)
#            out-dir: dist # The output directory created by the build command. Defaults to dist. (optional)

#      - name: Install Node.js
#        uses: actions/setup-node@v4
#        with:
#          node-version: 18
#          cache: npm

#      - name: Install dependencies
#        run: npm ci

#      - name: Build
#        run: npm run build

 #     - name: Upload artifact
 #       uses: actions/upload-pages-artifact@v3
 #       with:
 #         path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
#    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
